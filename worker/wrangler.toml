# KV namespace must match the YOURLS PHP plugin (CF_KV_NAMESPACE_ID).
name = "yourls-kv-redirect"
main = "src/index.js"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "YOURLS_LINKS"
id = "YOUR_KV_NAMESPACE_ID"

# Same value as LOGGING_SECRET_KEY in user/config.php (do not commit real values).
# Set in production: npx wrangler secret put LOGGING_SECRET_KEY
# Local dev: copy .dev.vars.example to .dev.vars
